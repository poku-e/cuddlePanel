<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cuddlePanel Login</title>
    <link rel="icon" type="image/png" href="/static/cuddle_logo.png">
    <link href="/static/vendor/bootstrap/5.3.8/bootstrap.min.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="auth-body" data-view="login">
    <main class="auth-card">
        <div class="auth-brand">
            <img src="/static/cuddle_logo.png" alt="cuddlePanel logo" class="brand-logo brand-logo-auth">
            <h1>cuddlePanel</h1>
        </div>
        <p class="text-secondary">Sign in to administer this server.</p>
        <form id="loginForm" class="vstack gap-3">
            <label class="cp-label">Username
                <input class="cp-input" name="username" autocomplete="username" required>
            </label>
            <label class="cp-label">Password
                <input class="cp-input" name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="btn btn-primary" type="submit">Sign in</button>
            <div id="message" class="small text-danger" role="alert"></div>
        </form>
    </main>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
