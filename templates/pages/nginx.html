<div class="row g-4">
    <div class="col-12 col-xl-4">
        <section class="cp-card">
            <div id="nginxPageState" data-can-manage="{{can_manage_nginx}}"></div>
            <h2>Register site</h2>
            <form id="nginxCreateForm" class="vstack gap-3">
                <label class="cp-label">Panel name<input class="cp-input" name="name" required minlength="3" maxlength="64"{{disabled_attr}}></label>
                <label class="cp-label">Filename<input class="cp-input" name="filename" placeholder="example.conf" required maxlength="128"{{disabled_attr}}></label>
                <label class="cp-label">Description<input class="cp-input" name="description" maxlength="200"{{disabled_attr}}></label>
                <label class="cp-label">Config<textarea class="cp-input cp-textarea cp-codearea" name="content"{{disabled_attr}}></textarea></label>
                <button class="btn btn-primary" type="submit"{{disabled_attr}}>Add site</button>
                <div id="nginxCreateMessage" class="small"></div>
            </form>
            {{view_only_note}}
        </section>
    </div>
    <div class="col-12 col-xl-8">
        <section class="cp-card">
            <div class="section-header"><h2>Allowlisted nginx sites</h2><button class="btn btn-outline-secondary btn-sm" id="refreshNginxButton" type="button">Refresh</button></div>
            <div id="nginxMeta" class="small text-secondary mb-3"></div>
            <div id="nginxMessage" class="small text-danger mb-3"></div>
            <div id="nginxSitesHost"></div>
        </section>
    </div>
</div>
